# Alembic configuration file
# See https://alembic.sqlalchemy.org for documentation

[alembic]
# Path to migration scripts
script_location = alembic

# Template for migration file names
file_template = %%(rev)s_%%(slug)s

# Timezone for "Created" timestamps in migration files
timezone = UTC

# sys.path path, will be prepended to sys.path if present.
# defaults to the current working directory.
prepend_sys_path = .

# version location specification; This defaults
# to alembic/versions.  When using multiple version
# directories, initial revisions must be specified with --version-path.
version_locations = %(here)s/alembic/versions

# The output encoding used when revision files
# are written from script.py.mako; defaults to utf-8.
output_encoding = utf-8

# Database URL — overridden at runtime by env.py reading DATABASE_URL from environment
sqlalchemy.url = postgresql+asyncpg://hsms_user:hsms_pass@db:5432/hsms


[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.  See the documentation for further
# detail and examples


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
