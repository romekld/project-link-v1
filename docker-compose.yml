services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  api:
    build:
      context: ./backend
    # NOTE: REDIS_URL in .env must be redis://redis:6379/0 (not localhost) when running via docker compose
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      - redis

  worker:
    build:
      context: ./backend
    command: celery -A app.worker.celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      - redis
