services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: hsms
      POSTGRES_USER: hsms_user
      POSTGRES_PASSWORD: hsms_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hsms_user -d hsms"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://hsms_user:hsms_pass@db:5432/hsms
      TEST_DATABASE_URL: postgresql+asyncpg://hsms_user:hsms_pass@db:5432/test_hsms
      REDIS_URL: redis://redis:6379/0
      DEBUG: "true"
      JWT_SECRET_KEY: "dev-secret-key-change-in-production-32chars-min"
      JWT_ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      start_period: 15s
      interval: 10s
      timeout: 5s
      retries: 3

  celery_worker:
    build: ./backend
    command: celery -A app.tasks.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://hsms_user:hsms_pass@db:5432/hsms
      REDIS_URL: redis://redis:6379/0
      DEBUG: "true"
      JWT_SECRET_KEY: "dev-secret-key-change-in-production-32chars-min"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks.celery_app inspect ping --destination celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  celery_beat:
    build: ./backend
    command: celery -A app.tasks.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://hsms_user:hsms_pass@db:5432/hsms
      REDIS_URL: redis://redis:6379/0
      DEBUG: "true"
      JWT_SECRET_KEY: "dev-secret-key-change-in-production-32chars-min"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data: